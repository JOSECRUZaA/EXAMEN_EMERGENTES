<!-- templates\form.html -->
{% extends "base.html" %}
{% block title %}{{ accion }} producto{% endblock %}
{% block content %}
<h3 class="mb-3">{{ accion }} producto</h3>
<form method="POST" class="card p-3 bg-white">
  <div class="mb-3">
    <label class="form-label">Nombre</label>
    <input type="text" name="nombre" class="form-control" required value="{{ producto.nombre if producto else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Categoría</label>
    <input type="text" name="categoria" class="form-control" required value="{{ producto.categoria if producto else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Precio</label>
    <input type="number" step="0.01" name="precio" class="form-control" required value="{{ producto.precio if producto else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Stock</label>
    <input type="number" name="stock" class="form-control" required value="{{ producto.stock if producto else '' }}">
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-success" type="submit">{{ accion }}</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancelar</a>
  </div>
</form>
{% endblock %}
